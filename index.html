<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VePronta - Escritório Buranelli</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; }
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #e0e0e0;
        }
        #ar-button {
            background-color: #007bff; /* Azul para destacar bem */
            color: white;
            border-radius: 30px; /* Mais arredondado, estilo app moderno */
            border: none;
            padding: 15px 30px;
            position: absolute;
            bottom: 15%; /* Subiu para 15% da altura da tela */
            left: 50%;
            transform: translateX(-50%);
            font-family: sans-serif;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0px 6px 15px rgba(0,0,0,0.4);
            z-index: 1000;
            cursor: pointer;
            white-space: nowrap; /* Impede o texto de quebrar linha */
        }
        #ar-button:active {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="https://raw.githubusercontent.com/FellipeXavier/vepronta_escritorio_buranelli/main/ESCRITORIO.glb"
        ar
        ar-modes="scene-viewer quick-look webxr"
        ar-scale="auto"
        camera-controls
        shadow-intensity="1"
        shadow-softness="0.5"
        environment-image="legacy"
        exposure="1"
        auto-rotate
        touch-action="pan-y">
        
        <button slot="ar-button" id="ar-button">
             🏢 VER EM TAMANHO REAL
        </button>

    </model-viewer>

</body>
</html>
