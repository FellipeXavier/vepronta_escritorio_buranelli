<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VePronta - Escritório Buranelli</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; }
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #f0f0f0;
        }
        /* Estilo do botão de Realidade Aumentada */
        #ar-button {
            background-color: #fff;
            border-radius: 8px;
            border: 1px solid #ccc;
            padding: 10px 20px;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: sans-serif;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <model-viewer 
        src="https://raw.githubusercontent.com/FellipeXavier/vepronta_escritorio_buranelli/main/ESCRITORIO.glb"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        poster="poster.webp"
        shadow-intensity="1"
        environment-image="neutral"
        auto-rotate
        touch-action="pan-y">
        
        <button slot="ar-button" id="ar-button">
             👋 VER NO MEU ESPAÇO
        </button>

        <div slot="progress-bar"></div>
    </model-viewer>

</body>
</html>
