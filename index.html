<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VePronta - Escritório Buranelli</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; }
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #f0f0f0;
        }
        #ar-button {
            background-color: #ffffff;
            border-radius: 8px;
            border: none;
            padding: 12px 24px;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: sans-serif;
            font-weight: bold;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.3);
            z-index: 100;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="https://raw.githubusercontent.com/FellipeXavier/vepronta_escritorio_buranelli/main/ESCRITORIO.glb"
        ar
        ar-modes="scene-viewer webxr quick-look"
        ar-scale="fixed"
        camera-controls
        shadow-intensity="1"
        environment-image="neutral"
        auto-rotate
        touch-action="pan-y"
        alt="Escritório Buranelli em Realidade Aumentada">
        
        <button slot="ar-button" id="ar-button">
             🏢 VER EM TAMANHO REAL
        </button>

    </model-viewer>

</body>
</html>
