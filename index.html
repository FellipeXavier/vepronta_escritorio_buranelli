<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VePronta - Escritório Buranelli</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; }
        model-viewer { width: 100%; height: 100%; background-color: #f0f0f0; }
        #ar-button {
            background-color: #ffffff;
            border-radius: 8px;
            border: none;
            padding: 12px 24px;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: sans-serif;
            font-weight: bold;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.3);
            z-index: 100;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="https://raw.githubusercontent.com/FellipeXavier/vepronta_escritorio_buranelli/main/ESCRITORIO.glb"
        ar
        ar-modes="scene-viewer webxr quick-look"
        ar-scale="auto"
        camera-controls
        shadow-intensity="1"
        shadow-softness="0.5"
        exposure="1"
        environment-image="legacy"
        touch-action="pan-y">
        
        <button slot="ar-button" id="ar-button">
             🏢 VER PROJETO (AR)
        </button>

    </model-viewer>

</body>
</html>
